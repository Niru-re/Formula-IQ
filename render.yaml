services:
  - type: web
    name: formula-iq-fullstack
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: "" # Empty means it will use the same host in production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
